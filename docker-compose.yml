services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-copilot-backend
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-copilot-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped